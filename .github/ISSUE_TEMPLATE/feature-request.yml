name: Feature Request
description: Suggest an idea for this project
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem-or-use-case
    attributes:
      label: Problem or Use Case
      description: What problem does this solve?
      placeholder: Describe the problem, limitation, or use case.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the desired solution
      placeholder: Describe what you want to happen.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How to know it's done
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: false

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Other approaches considered
      placeholder: Describe alternatives you have considered.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Extra context
      placeholder: Add any additional context, examples, or links.
    validations:
      required: false
